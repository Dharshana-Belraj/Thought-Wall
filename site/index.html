<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Wall</title>
<link href="./styles.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<!-- config.js is generated at build-time from environment variables -->
<script src="./config.js"></script>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="logo">Thought Wall</div>
      <div class="logo-tagline">Dharshana's space</div>
    </div>

    <div class="sidebar-scroll">
      <div class="nav-section">Library</div>
      <div class="nav-item active" data-view="all" onclick="setView('all', this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1.5" fill="currentColor" opacity="0.7"/><rect x="8" y="1" width="5" height="5" rx="1.5" fill="currentColor" opacity="0.4"/><rect x="1" y="8" width="5" height="5" rx="1.5" fill="currentColor" opacity="0.4"/><rect x="8" y="8" width="5" height="5" rx="1.5" fill="currentColor" opacity="0.7"/></svg>
        All poems
      </div>
      <div class="nav-item" data-view="favourites" onclick="setView('favourites', this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 2.5l1.3 3H12l-2.4 1.8.9 3L7 8.5l-3.5 1.8.9-3L2 5.5h3.7z" fill="currentColor" opacity="0.6"/></svg>
        Favourites
      </div>
      <div class="nav-item" data-view="collections" onclick="setView('collections', this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.6"/><path d="M4 6h6M4 9h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/></svg>
        Collections
      </div>

      <div class="nav-section">By mood</div>
      <div class="nav-item" data-view="mood-melancholy" onclick="setView('mood-melancholy', this)">
        <span class="mood-dot mood-purple"></span> Melancholy
      </div>
      <div class="nav-item" data-view="mood-peaceful" onclick="setView('mood-peaceful', this)">
        <span class="mood-dot mood-teal"></span> Peaceful
      </div>
      <div class="nav-item" data-view="mood-longing" onclick="setView('mood-longing', this)">
        <span class="mood-dot mood-coral"></span> Longing
      </div>
      <div class="nav-item" data-view="mood-wonder" onclick="setView('mood-wonder', this)">
        <span class="mood-dot mood-blue"></span> Wonder
      </div>
      <div class="nav-item" data-view="mood-nostalgia" onclick="setView('mood-nostalgia', this)">
        <span class="mood-dot mood-amber"></span> Nostalgia
      </div>
    </div>

    <div class="sidebar-bottom">
      <button class="write-btn" onclick="openEditor()">+ Write new poem</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="topbar-title">All poems</span>
        <span class="topbar-count" id="topbar-count">0 poems</span>
      </div>
      <div class="topbar-right">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu" onclick="toggleMobileMenu()">☰</button>
        <input type="text" class="search-box" id="search-input" placeholder="Search poems..." oninput="onSearch(this.value)">
        <div class="icon-btn" id="test-db-btn" title="Test DB" onclick="testSupabase()">DB</div>
        <div class="icon-btn active" id="grid-btn" title="Grid view" onclick="toggleLayout('grid')">
          <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><rect x="0" y="0" width="5" height="5" rx="1" fill="currentColor"/><rect x="7" y="0" width="5" height="5" rx="1" fill="currentColor"/><rect x="0" y="7" width="5" height="5" rx="1" fill="currentColor"/><rect x="7" y="7" width="5" height="5" rx="1" fill="currentColor"/></svg>
        </div>
        <div class="icon-btn" id="list-btn" title="List view" onclick="toggleLayout('list')">
          <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><rect x="0" y="1" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="0" y="5.25" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="0" y="9.5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
        </div>
      </div>
    </div>

    <div class="content" id="main-content">
      <!-- Dynamic content -->
    </div>
  </div>
</div>

<!-- Editor Overlay -->
<div class="overlay hidden" id="editor-overlay" onclick="overlayClickClose(event, 'editor-overlay')">
  <div class="editor-modal" onclick="event.stopPropagation()">
    <div class="editor-header">
      <span class="editor-header-title" id="editor-mode-label">New poem</span>
      <div class="close-btn" onclick="closeEditor()">✕</div>
    </div>
    <div class="editor-body">
      <div>
        <div class="field-label">Title</div>
        <input type="text" class="title-input" id="poem-title-input" placeholder="Untitled poem..." maxlength="100">
      </div>
      <div>
        <div class="field-label">Poem</div>
        <textarea class="poem-textarea" id="poem-body-input" placeholder="Begin your verse here..." oninput="updatePoemStats()"></textarea>
      </div>
      <div class="poem-stats-bar" id="poem-stats-bar">
        <span>0 words</span>
        <span>0 lines</span>
      </div>
      <div class="meta-row">
        <div>
          <div class="field-label">Mood</div>
          <select class="select-input" id="poem-mood-input">
            <option value="">No mood</option>
            <option value="melancholy">Melancholy</option>
            <option value="peaceful">Peaceful</option>
            <option value="longing">Longing</option>
            <option value="wonder">Wonder</option>
            <option value="nostalgia">Nostalgia</option>
          </select>
        </div>
        <div>
          <div class="field-label">Collection</div>
          <input type="text" class="text-input" id="poem-collection-input" placeholder="e.g. Rain poems" maxlength="50">
        </div>
        <div>
          <div class="field-label">Form</div>
          <select class="select-input" id="poem-form-input">
            <option value="">Free verse</option>
            <option value="haiku">Haiku</option>
            <option value="sonnet">Sonnet</option>
            <option value="ghazal">Ghazal</option>
            <option value="ode">Ode</option>
            <option value="elegy">Elegy</option>
            <option value="prose">Prose poem</option>
          </select>
        </div>
      </div>
    </div>
    <div class="editor-footer">
      <button class="btn-danger hidden" id="delete-btn" onclick="deletePoem()">Delete</button>
      <button class="btn-secondary" onclick="closeEditor()">Cancel</button>
      <button class="btn-primary" onclick="savePoem()">Save poem</button>
    </div>
  </div>
</div>

<!-- View Overlay -->
<div class="overlay hidden" id="view-overlay" onclick="overlayClickClose(event, 'view-overlay')">
  <div class="view-modal" onclick="event.stopPropagation()">
    <div class="view-modal-header">
      <div>
        <div id="view-title" class="view-modal-title"></div>
      </div>
      <div class="close-btn" onclick="closeView()">✕</div>
    </div>
    <div class="view-modal-body">
      <div class="poem-text-display" id="view-body"></div>
    </div>
    <div class="view-modal-meta">
      <span class="meta-chip" id="view-date"></span>
      <span class="meta-chip" id="view-mood" style="display:none"></span>
      <span class="meta-chip" id="view-form" style="display:none"></span>
      <span class="meta-chip" id="view-collection" style="display:none"></span>
      <div class="view-actions">
        <div class="icon-btn" title="Toggle favourite" onclick="toggleFavFromView()" id="fav-view-btn">☆</div>
        <div class="icon-btn" title="Edit poem" onclick="editFromView()">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 10.5L4.5 9l7-7 1.5 1.5-7 7L2 12V10.5z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>
<!-- Mobile new-poem button -->
<button class="mobile-write-btn" aria-label="Write new poem" onclick="openEditor()">+</button>
<!-- Mobile sidebar backdrop -->
<div class="mobile-backdrop" id="mobile-backdrop" onclick="toggleMobileMenu(false)"></div>

<script src="./app.js" defer></script>
</body>
</html>
